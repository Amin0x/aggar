<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${property.title} + ' - Aggar'">Property Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>

<!-- Include header fragment -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <a th:href="@{/}" class="btn btn-link">&larr; Back to listings</a>

    <div class="row">
        <div class="col-md-8">
            <h1 th:text="${property.title}">Title</h1>
            <p class="text-muted">
                <span th:text="${property.city}">City</span>
                <span th:if="${property.neighborhood != null}"> - <span th:text="${property.neighborhood}">Neighborhood</span></span>
            </p>

            <h3 class="mt-3">
                <span th:text="${property.currency}">USD</span>
                <span th:text="${property.price}">0.00</span>
                <small class="text-muted" th:if="${property.listingType == 'rent'}">/ <span th:text="${property.pricePeriod}">monthly</span></small>
            </h3>

            <p class="mt-4" th:text="${property.description}">Description</p>

            <ul>
                <li><strong th:text="${property.bedrooms}">0</strong> bedrooms</li>
                <li><strong th:text="${property.bathrooms}">0</strong> bathrooms</li>
                <li><strong th:text="${property.floors}">0</strong> floors</li>
                <li th:if="${property.area != null}"><strong th:text="${property.area}">0</strong> area</li>
            </ul>

            <div th:if="${property.images != null}">
                <h5>Images</h5>
                <div class="row">
                    <div class="col-md-4 mb-2" th:each="img : ${property.images}">
                        <img th:src="${img.url}" class="img-fluid rounded" alt="image" />
                    </div>
                </div>
            </div>

            <div th:if="${property.amenities != null}">
                <h5 class="mt-3">Amenities</h5>
                <ul>
                    <li th:each="a : ${property.amenities}" th:text="${a}">Amenity</li>
                </ul>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5>Contact</h5>
                    <p>Owner/Agent contact details would go here.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Include footer fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
