<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title th:text="#{header.brand} + ' - ' + #{state.list.title}">States - Aggar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>
<body>

<!-- Include header fragment -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 th:text="#{state.list.title}">States</h1>
        <a th:href="@{/states/add}" class="btn btn-primary" th:text="#{state.list.add.new}">Add New State</a>
    </div>

    <div th:if="${states == null or #lists.isEmpty(states)}">
        <div class="alert alert-info" th:text="#{state.list.no.states}">No states found.</div>
    </div>

    <div class="table-responsive" th:if="${states != null}">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th th:text="#{state.list.id}">ID</th>
                    <th th:text="#{state.list.name}">Name</th>
                    <th th:text="#{state.list.code}">Code</th>
                    <th th:text="#{state.list.actions}">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="state : ${states}">
                    <td th:text="${state.id}">1</td>
                    <td th:text="${state.name}">State Name</td>
                    <td th:text="${state.code}">ST</td>
                    <td>
                        <a th:href="@{'/states/edit/' + ${state.id}}" class="btn btn-sm btn-warning" th:text="#{state.list.edit}">Edit</a>
                        <a th:href="@{'/states/delete/' + ${state.id}}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')" th:text="#{state.list.delete}">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Include footer fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
