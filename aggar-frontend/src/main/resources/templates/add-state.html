<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title th:text="#{header.brand} + ' - ' + #{add.state.title}">Add State - Aggar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>
<body>

<!-- Include header fragment -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 th:text="#{add.state.title}">Add New State</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/states/add}" method="post" th:object="${state}">
                        <div class="mb-3">
                            <label for="stateName" class="form-label" th:text="#{add.state.name}">State Name</label>
                            <input type="text" class="form-control" id="stateName" name="name" th:placeholder="#{add.state.name.placeholder}" required>
                        </div>
                        <div class="mb-3">
                            <label for="stateCode" class="form-label" th:text="#{add.state.code}">State Code</label>
                            <input type="text" class="form-control" id="stateCode" name="code" th:placeholder="#{add.state.code.placeholder}" required>
                        </div>
                        <button type="submit" class="btn btn-primary" th:text="#{add.state.submit}">Add State</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Include footer fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
