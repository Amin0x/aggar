<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title th:text="#{header.brand} + ' - ' + #{add.city.title}">Add City - Aggar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>
<body>

<!-- Include header fragment -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 th:text="#{add.city.title}">Add New City</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/cities/add}" method="post" th:object="${city}">
                        <div class="mb-3">
                            <label for="state" class="form-label" th:text="#{add.city.state}">State</label>
                            <select class="form-select" id="state" name="stateName" required>
                                <option value="" th:text="#{add.city.select.state}">Select State</option>
                                <option th:each="state : ${states}" th:value="${state.name}" th:text="${state.name}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="cityName" class="form-label" th:text="#{add.city.name}">City Name</label>
                            <input type="text" class="form-control" id="cityName" name="name" th:placeholder="#{add.city.name.placeholder}" required>
                        </div>
                        <button type="submit" class="btn btn-primary" th:text="#{add.city.submit}">Add City</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Include footer fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
