<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Add Property - Aggar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>

<!-- Include header fragment -->
<div th:replace="fragments/header :: header"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Add New Property</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/properties/add}" th:object="${property}" method="post" id="propertyForm">
                        
                        <!-- Basic Information -->
                        <div class="row mb-3">
                            <div class="col-12">
                                <h5 class="text-secondary"><i class="fas fa-info-circle me-2"></i>Basic Information</h5>
                                <hr>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="listingType" class="form-label">Listing Type *</label>
                                <select class="form-select" th:field="*{listingType}" id="listingType" required
                                        th:classappend="${#fields.hasErrors('listingType')} ? 'is-invalid' : ''">
                                    <option value="">Select Listing Type</option>
                                    <option value="SALE">For Sale</option>
                                    <option value="RENT">For Rent</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('listingType')}" th:errors="*{listingType}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="title" class="form-label">Property Title *</label>
                                <input type="text" class="form-control" th:field="*{title}" id="title" required 
                                       placeholder="e.g., Modern 3-Bedroom Apartment"
                                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-12">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" th:field="*{description}" id="description" rows="4" 
                                          placeholder="Describe your property..."></textarea>
                            </div>
                        </div>

                        <!-- Pricing Information -->
                        <div class="row mb-3">
                            <div class="col-12">
                                <h5 class="text-secondary"><i class="fas fa-dollar-sign me-2"></i>Pricing Information</h5>
                                <hr>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="price" class="form-label">Price *</label>
                                <input type="number" class="form-control" th:field="*{price}" id="price" required 
                                       step="0.01" min="0" placeholder="0.00"
                                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                            </div>
                            <div class="col-md-4">
                                <label for="currency" class="form-label">Currency</label>
                                <select class="form-select" th:field="*{currency}" id="currency">
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                    <option value="GBP">GBP</option>
                                    <option value="AED">AED</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="pricePeriod" class="form-label">Price Period</label>
                                <select class="form-select" th:field="*{pricePeriod}" id="pricePeriod">
                                    <option value="">One-time</option>
                                    <option value="MONTHLY">Monthly</option>
                                    <option value="YEARLY">Yearly</option>
                                    <option value="WEEKLY">Weekly</option>
                                    <option value="DAILY">Daily</option>
                                </select>
                            </div>
                        </div>

                        <!-- Property Details -->
                        <div class="row mb-3">
                            <div class="col-12">
                                <h5 class="text-secondary"><i class="fas fa-home me-2"></i>Property Details</h5>
                                <hr>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-3">
                                <label for="bedrooms" class="form-label">Bedrooms</label>
                                <input type="number" class="form-control" th:field="*{bedrooms}" id="bedrooms" 
                                       min="0" placeholder="0">
                            </div>
                            <div class="col-md-3">
                                <label for="bathrooms" class="form-label">Bathrooms</label>
                                <input type="number" class="form-control" th:field="*{bathrooms}" id="bathrooms" 
                                       min="0" placeholder="0">
                            </div>
                            <div class="col-md-3">
                                <label for="rooms" class="form-label">Total Rooms</label>
                                <input type="number" class="form-control" th:field="*{rooms}" id="rooms" 
                                       min="0" placeholder="0">
                            </div>
                            <div class="col-md-3">
                                <label for="floors" class="form-label">Floors</label>
                                <input type="number" class="form-control" th:field="*{floors}" id="floors" 
                                       min="0" placeholder="0">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="area" class="form-label">Area (sq ft / sq m)</label>
                                <input type="number" class="form-control" th:field="*{area}" id="area" 
                                       step="0.01" min="0" placeholder="0.00">
                            </div>
                        </div>

                        <!-- Location Information -->
                        <div class="row mb-3">
                            <div class="col-12">
                                <h5 class="text-secondary"><i class="fas fa-map-marker-alt me-2"></i>Location Information</h5>
                                <hr>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="state" class="form-label">State *</label>
                                <input type="text" class="form-control" th:field="*{state}" id="state" required 
                                       placeholder="e.g., California">
                            </div>
                            <div class="col-md-4">
                                <label for="city" class="form-label">City *</label>
                                <input type="text" class="form-control" th:field="*{city}" id="city" required 
                                       placeholder="e.g., Los Angeles"
                                       th:classappend="${#fields.hasErrors('city')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
                            </div>
                            <div class="col-md-4">
                                <label for="neighborhood" class="form-label">Neighborhood</label>
                                <input type="text" class="form-control" th:field="*{neighborhood}" id="neighborhood" 
                                       placeholder="e.g., Beverly Hills">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="locationLat" class="form-label">Latitude</label>
                                <input type="number" class="form-control" th:field="*{locationLat}" id="locationLat" 
                                       step="0.000001" placeholder="34.052235">
                            </div>
                            <div class="col-md-6">
                                <label for="locationLng" class="form-label">Longitude</label>
                                <input type="number" class="form-control" th:field="*{locationLng}" id="locationLng" 
                                       step="0.000001" placeholder="-118.243683">
                            </div>
                        </div>

                        <!-- Status -->
                        <div class="row mb-3">
                            <div class="col-12">
                                <h5 class="text-secondary"><i class="fas fa-toggle-on me-2"></i>Status</h5>
                                <hr>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="status" class="form-label">Property Status</label>
                                <select class="form-select" th:field="*{status}" id="status">
                                    <option value="available">Available</option>
                                    <option value="pending">Pending</option>
                                    <option value="sold">Sold</option>
                                    <option value="rented">Rented</option>
                                    <option value="off_market">Off Market</option>
                                </select>
                            </div>
                        </div>

                        <!-- Form Actions -->
                        <div class="row mt-4">
                            <div class="col-12">
                                <div class="d-flex justify-content-between">
                                    <a href="/" class="btn btn-secondary">
                                        <i class="fas fa-times me-2"></i>Cancel
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-2"></i>Add Property
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Error Messages -->
                        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger mt-3">
                            <h6><i class="fas fa-exclamation-triangle me-2"></i>Please fix the following errors:</h6>
                            <ul>
                                <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                            </ul>
                        </div>

                        <!-- Flash Error Messages -->
                        <div th:if="${error}" class="alert alert-danger mt-3">
                            <i class="fas fa-exclamation-circle me-2"></i>
                            <span th:text="${error}">Error occurred</span>
                        </div>

                        <!-- Success Message -->
                        <div th:if="${success}" class="alert alert-success mt-3">
                            <i class="fas fa-check-circle me-2"></i>
                            <span th:text="${success}">Property added successfully!</span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Include footer fragment -->
<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Optional: Add form validation enhancements
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('propertyForm');
    const listingType = document.getElementById('listingType');
    const pricePeriod = document.getElementById('pricePeriod');
    
    // Show/hide price period based on listing type
    listingType.addEventListener('change', function() {
        if (this.value === 'SALE') {
            pricePeriod.value = '';
            pricePeriod.disabled = true;
        } else {
            pricePeriod.disabled = false;
        }
    });
    
    // Initialize
    if (listingType.value === 'SALE') {
        pricePeriod.disabled = true;
    }
});
</script>
</body>
</html>
