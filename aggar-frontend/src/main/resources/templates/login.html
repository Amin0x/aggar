<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{login.sign.in} + ' - Aggar'">Login - Aggar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #333;
            font-weight: 600;
        }
        .login-header p {
            color: #666;
            margin-top: 10px;
        }
        .form-control {
            height: 45px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .btn-login {
            width: 100%;
            height: 45px;
            background: #007bff;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #0056b3;
        }
        .alert {
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .footer-text a {
            color: #007bff;
            text-decoration: none;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="bg-light">

<!-- Include header fragment -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
    <div class="login-container">
        <div class="login-header">
            <h2 th:text="#{login.welcome.back}">Welcome Back</h2>
            <p th:text="#{login.sign.in.account}">Sign in to your Aggar account</p>
        </div>

        <!-- Error Message -->
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <span th:text="${errorMessage}">Error message</span>
        </div>

        <!-- Success Message -->
        <div th:if="${message}" class="alert alert-success" role="alert">
            <span th:text="${message}">Success message</span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label" th:text="#{login.email.username}">Email or Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       th:placeholder="#{login.email.username}" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label" th:text="#{login.password}">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       th:placeholder="#{login.password}" required>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label" for="rememberMe" th:text="#{login.remember.me}">
                    Remember me
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-login" th:text="#{login.sign.in}">Sign In</button>
        </form>

        <div class="footer-text">
            <p th:text="#{login.no.account} + ' ' + #{login.sign.up.now}">Don't have an account? <a th:href="@{/register}">Sign up now</a></p>
            <p><a href="#" th:text="#{login.forgot.password}">Forgot your password?</a></p>
        </div>
    </div>
</div>

<!-- Include footer fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
