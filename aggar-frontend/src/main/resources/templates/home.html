<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{header.brand} + ' - ' + #{home.latest.properties}">Aggar - Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
    </style>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- Include header fragment -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <h1 th:text="#{home.latest.properties}">Latest Properties</h1>

    <div th:if="${properties == null or #lists.isEmpty(properties)}">
        <div class="alert alert-info" th:text="#{home.no.properties}">No properties found.</div>
    </div>

    <div class="row" th:if="${properties != null}">
        <div class="col-md-4 mb-3" th:each="prop : ${properties}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${prop.title}">Property title</h5>
                    <h6 class="card-subtitle mb-2 text-muted">
                        <span th:text="${prop.listingType}">sale/rent</span> -
                        <span th:text="${prop.currency}">USD</span>
                        <span th:text="${prop.price}">0.00</span>
                    </h6>

                    <p class="card-text">
                        <strong th:text="${prop.city}">City</strong>
                        <span th:if="${prop.neighborhood != null}"> - <span th:text="${prop.neighborhood}">Neighborhood</span></span>
                    </p>

                    <p class="card-text">
                        <small class="text-muted">
                            <span th:text="${prop.bedrooms}">0</span> <span th:text="#{home.beds}">beds</span> •
                            <span th:text="${prop.bathrooms}">0</span> <span th:text="#{home.baths}">baths</span>
                        </small>
                    </p>

                    <a th:href="@{'/properties/' + ${prop.id}}" class="btn btn-primary" th:text="#{home.view}">View</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Include footer fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
