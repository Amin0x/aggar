<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{header.brand} + ' - Saved Properties'">Aggar - Saved Properties</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <h1>Saved Properties</h1>

    <div th:if="${#lists.isEmpty(savedProperties)}" class="alert alert-info">
        You haven't saved any properties yet.
        <a th:href="@{/}" class="alert-link">Browse properties</a>
    </div>

    <div class="row" th:if="${not #lists.isEmpty(savedProperties)}">
        <div class="col-md-4 mb-3" th:each="prop : ${savedProperties}">
            <div class="card h-100">
                <img th:if="${prop.images != null and not #lists.isEmpty(prop.images)}"
                     th:src="${prop.images[0].url}"
                     class="card-img-top" style="height: 200px; object-fit: cover;" alt="Property image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${prop.title}">Property title</h5>
                    <h6 class="card-subtitle mb-2 text-muted">
                        <span th:text="${prop.listingType}">sale/rent</span> -
                        <span th:text="${prop.currency}">USD</span>
                        <span th:text="${prop.price}">0.00</span>
                    </h6>
                    <p class="card-text">
                        <strong th:text="${prop.city}">City</strong>
                    </p>
                    <a th:href="@{'/properties/' + ${prop.id}}" class="btn btn-primary">View</a>
                    <button class="btn btn-outline-danger btn-sm" onclick="unsaveProperty(this)"
                            th:data-property-id="${prop.id}">
                        <i class="fas fa-heart"></i> Remove
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function unsaveProperty(button) {
        const propertyId = button.getAttribute('data-property-id');
        if (confirm('Remove this property from saved list?')) {
            // TODO: Implement actual unsave logic via API
            alert('Property removed from saved list');
            location.reload();
        }
    }
</script>
</body>
</html>
